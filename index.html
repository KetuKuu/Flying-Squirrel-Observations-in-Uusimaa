<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="initial-scale=1,user-scalable=no,maximum-scale=1,width=device-width">
        <meta name="mobile-web-app-capable" content="yes">
        <meta name="apple-mobile-web-app-capable" content="yes">
        <link rel="stylesheet" href="./resources/ol.css">
        <link rel="stylesheet" href="resources/fontawesome-all.min.css">
        <link href="resources/photon-geocoder-autocomplete.min.css" rel="stylesheet">
        <link rel="stylesheet" href="./resources/ol-layerswitcher.css">
        <link rel="stylesheet" href="./resources/qgis2web.css">
        <style>
        html, body {
            background-color: #ffffff;
        }
        .ol-control > * {
            background-color: #f8f8f8!important;
            color: #444444!important;
            border-radius: 0px;
        }
        .ol-attribution a, .gcd-gl-input::placeholder, .search-layer-input-search::placeholder {
            color: #444444!important;
        }
        .search-layer-input-search {
            background-color: #f8f8f8!important;
        }
        .ol-control > *:focus, .ol-control >*:hover {
            background-color: rgba(248, 248, 248, 0.7)!important;
        } 
        .ol-control {
            background-color: rgba(255,255,255,.4) !important;
            padding: 2px !important;
        } 
        </style>

        <style>
        html, body, #map {
            width: 100%;
            height: 100%;
            padding: 0;
            margin: 0;
        }
        
        /* TYYLIT ENGLANNINKIELISELLE VUOSIVALIKOLLE (Ylänurkka) */
        #vuosilaatikko {
            position: absolute;
            top: 15px;
            left: 60px;
            z-index: 2000;
            background: white;
            padding: 10px;
            border-radius: 5px;
            border: 2px solid #ccc;
            font-family: Arial, sans-serif;
            font-size: 14px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        
        #yearSelect {
            padding: 3px;
            font-size: 14px;
            margin-left: 5px;
        }

        /* TYYLIT KUVAPOHJAISELLE LEGENDILLE (Alanurkka) */
        #map-legend {
            position: absolute;
            bottom: 25px;
            right: 15px;
            z-index: 2000;
            background: white;
            padding: 8px;
            border-radius: 5px;
            border: 2px solid #ccc;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        #map-legend img {
            display: block;
            width: 130px; /* Tässä skaalataan kuva hieman pienemmäksi */
            height: auto;
        }
        </style>
        <title>Flying Squirrel Observations in Uusimaa</title>
    </head>
    <body>
        <!-- ENGLANNINKIELINEN VUOSIVALIKKO -->
        <div id="vuosilaatikko">
            <label for="yearSelect"><b>Select year:</b></label>
            <select id="yearSelect" onchange="suodataVuodet()">
                <option value="kaikki">Show all years</option>
                <option value="2014">2014</option>
                <option value="2015">2015</option>
                <option value="2016">2016</option>
                <option value="2017">2017</option>
                <option value="2018">2018</option>
                <option value="2019">2019</option>
                <option value="2020">2020</option>
                <option value="2021">2021</option>
                <option value="2022">2022</option>
                <option value="2023">2023</option>
                <option value="2024">2024</option>
            </select>
        </div>

        <!-- LEGENDI UPOTETULLA KUVALLA -->
        <div id="map-legend">
            <img src="legend.png.png" alt="Map Legend">
        </div>

        <div id="map">
            <div id="popup" class="ol-popup">
                <a href="#" id="popup-closer" class="ol-popup-closer"></a>
                <div id="popup-content"></div>
            </div>
        </div>
        <script src="resources/qgis2web_expressions.js"></script>
        <script src="./resources/functions.js"></script>
        <script src="./resources/ol.js"></script>
        <script src="./resources/ol-layerswitcher.js"></script>
        <script src="resources/photon-geocoder-autocomplete.min.js"></script>
        <script src="resources/olms.js"></script>
        <script src="layers/Aluejaot_2026_10k_1.js"></script><script src="layers/Municipalities_2.js"></script><script src="layers/Observations_3.js"></script>
        <script src="styles/Aluejaot_2026_10k_1_style.js"></script><script src="styles/Municipalities_2_style.js"></script><script src="styles/Observations_3_style.js"></script>
        <script src="./layers/layers.js" type="text/javascript"></script> 
        <script src="./resources/Autolinker.min.js"></script>
        <script src="./resources/qgis2web.js"></script>        

        <!-- KORJATTU JA TÄYDELLINEN SUODATUS- SEKÄ LASKENTAFUNKTIO -->
        <script>
            // Otetaan heti alussa talteen kaikki tason alkuperäiset havaintopisteet muistiin
            var alkuperaisetFeatures = lyr_Observations_3.getSource().getFeatures().slice();

            // Funktio, joka suodattaa pisteet näkyviin valikon mukaan
            function suodataVuodet() {
                var valittuVuosi = document.getElementById("yearSelect").value;
                var source = lyr_Observations_3.getSource();
                
                // Tyhjennetään taso hetkellisesti pisteistä
                source.clear();
                
                // Käydään muistissa olevat pisteet läpi ja lisätään vain ne, jotka täsmäävät
                alkuperaisetFeatures.forEach(function(feature) {
                    var rakaVuosi = feature.get('year');
                    if (rakaVuosi !== undefined && rakaVuosi !== null) {
                        var pisteenVuosi = String(rakaVuosi).trim();
                        
                        if (valittuVuosi === "kaikki" || pisteenVuosi === valittuVuosi) {
                            source.addFeature(feature);
                        }
                    }
                });
            }

            // Lasketaan havaintojen kokonaismäärä lennossa popup-ikkunaan (Englanniksi)
            map.on('singleclick', function(evt) {
                setTimeout(function() {
                    var popupContent = document.getElementById('popup-content');
                    if (!popupContent || popupContent.innerHTML === "") return;

                    map.forEachFeatureAtPixel(evt.pixel, function(feature, layer) {
                        if (layer === lyr_Observations_3) {
                            var klikattuKunta = feature.get('Location') || feature.get('location') || feature.get('namefin');
                            var klikattuVuosi = String(feature.get('year')).trim();
                            
                            if (!klikattuKunta || !klikattuVuosi) return;

                            var kokonaismaara = 0;
                            
                            // Käytetään laskennassa aina kaikkia alkuperäisiä ominaisuuksia, jotta tulos on oikein
                            alkuperaisetFeatures.forEach(function(f) {
                                var k = f.get('Location') || f.get('location') || f.get('namefin');
                                var v = String(f.get('year')).trim();
                                if (k === klikattuKunta && v === klikattuVuosi) {
                                    kokonaismaara++;
                                }
                            });

                            var lisateksti = "<hr style='margin:5px 0; border:0; border-top:1px solid #ccc;'>" +
                                             "<b>Total observations in this municipality this year:</b> " + kokonaismaara + " pcs";
                            
                            if (!popupContent.innerHTML.includes("Total observations in this municipality")) {
                                popupContent.innerHTML += lisateksti;
                            }
                        }
                    });
                }, 80);
            });
        </script>
    </body>
</html>
